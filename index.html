<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TravelQR: Agency Edition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --primary: #f59e0b; 
            --bg: #030712;
            --text-main: #f9fafb;
            --text-muted: #a1a1aa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top right, #111827, #030712);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; height: 100vh;
        }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 20px 20px 10px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(3,7,18,0.98), rgba(3,7,18,0.85) 80%, transparent);
            box-sizing: border-box;
        }

        .filter-row {
            display: flex; gap: 6px; margin-top: 8px; overflow-x: auto;
            padding-bottom: 2px; -webkit-overflow-scrolling: touch;
        }
        .filter-row::-webkit-scrollbar { display: none; }
        
        .filter-tab {
            background: rgba(255,255,255,0.05); color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.08); padding: 5px 12px;
            border-radius: 20px; font-size: 11px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: all 0.2s ease;
        }
        .filter-tab.active {
            background: var(--primary); color: #000; border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.2);
        }

        .card-badge {
            font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
            color: #000000; text-transform: uppercase;
            background: #ffffff; padding: 4px 10px; border-radius: 6px;
            display: inline-block; margin-bottom: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .swiper { width: 100%; height: 100vh; padding-top: 155px; padding-bottom: 35px; box-sizing: border-box; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; width: 320px; }

        .card {
            width: 100%; height: 410px;
            background-size: cover; background-position: center;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 25px; box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden;
            will-change: transform;
        }

        .card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 65%);
            z-index: 1;
        }

        .card-content { 
            position: relative; 
            z-index: 2; 
            width: 100%; 
        }
        .card h2 { font-size: 20px; margin: 4px 0; font-weight: 800; line-height: 1.2; }
        .card p { color: #e5e7eb; margin: 0 0 14px; font-size: 12px; }

        .btn-view {
            background: var(--primary); color: black; border: none;
            padding: 14px; border-radius: 15px; font-weight: 700;
            cursor: pointer; width: 100%; -webkit-tap-highlight-color: transparent;
        }

        #sheet {
            position: fixed; bottom: -100%; left: 0;
            width: 100%; height: 85%;
            background: #ffffff; color: #111827;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            z-index: 100; padding: 30px 20px; box-sizing: border-box;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(100%);
            overflow-y: auto;
        }
        #sheet.open { bottom: 0; transform: translateY(0); }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .company-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 10px;
        }

        .title-area {
            display: flex;
            flex-direction: column;
        }
        .contact-area {
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            line-height: 1.3;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; backdrop-filter: blur(4px); }
        .media-container { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 20px; background: #eee; min-height: 150px; }
        img { width: 100%; display: block; border-radius: 20px; }
        .agency-itinerary { position: relative; padding-left: 20px; margin: 30px 0; }
        .agency-itinerary::before { content: ''; position: absolute; left: 34px; top: 0; bottom: 0; width: 2px; background: #f3f4f6; z-index: 0; }
        .itinerary-step { display: flex; gap: 20px; margin-bottom: 25px; position: relative; z-index: 1; opacity: 0; }
        #sheet.open .itinerary-step { animation: fadeInUp 0.4s ease forwards; }
        .step-icon { width: 32px; height: 32px; background: white; border: 2px solid #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #94a3b8; flex-shrink: 0; }
        .step-icon.active { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); animation: pulseIcon 2s infinite; }
        .step-details h4 { margin: 0; font-size: 16px; font-weight: 700; }
        .step-details p { margin: 4px 0 0; font-size: 13px; color: #64748b; }
        .step-time { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }

        @keyframes pulseIcon { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        function renderDestinations() {
            const wrapper = document.getElementById('swiper-wrapper');
            wrapper.innerHTML = ''; 

            const filteredData = destinations.filter(dest => {
                const matchesCountry = (activeCountryFilter === 'all' || dest.country === activeCountryFilter);
                const matchesTransit = (activeTransitFilter === 'all' || dest.travelType === activeTransitFilter);
                return matchesCountry && matchesTransit;
            });

            if (filteredData.length === 0) {
                wrapper.innerHTML = `<div style="text-align:center; width:100%; padding-top:60px; color:var(--text-muted); font-size: 13px;">Аялал олдсонгүй.</div>`;
                return;
            }

            const fragment = document.createDocumentFragment();
            filteredData.forEach(dest => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                
                // Энд баж (badge) солих нөхцөлт логикийг оруулж байна
                let computedBadge = `Бүх сард гардаг аялал, хүний тоо дүүргэж явдаг.`;
                
                if (dest.city.includes("Жининь- Бээжин- Юниверсал")) {
                    computedBadge = `Долоо хоног бүрийн Пүрэв гарагт гардаг аялал.`;
                } else if (dest.city.includes("Хөх хотын бүтэн биеийн шинжилгээтэй аялал")) {
                    computedBadge = `Долоо хоног бүрийн Лхагва гарагт гардаг аялал.`;
                }

                slide.innerHTML = `
                    <div class="card" style="background-image: url('${dest.bg}')">
                        <div class="card-content">
                            <span class="card-badge">${computedBadge}</span>
                            <h2>${dest.city}</h2>
                            <p>${dest.desc || ''}</p>
                            <button class="btn-view" onclick="openSheet('${dest.city.replace(/'/g, "\\'")}')">Маршрут харах</button>
                        </div>
                    </div>
                `;
                fragment.appendChild(slide);
            });
            wrapper.appendChild(fragment);

            if (mainSwiperInstance) mainSwiperInstance.destroy(true, true);

            mainSwiperInstance = new Swiper(".mySwiper", {
                effect: "coverflow",
                centeredSlides: true,
                slidesPerView: "auto",
                coverflowEffect: { rotate: 5, stretch: 0, depth: 100, modifier: 2, slideShadows: false },
            });
            lucide.createIcons();
        }
        
        function setFilter(type, value, element) {
            element.parentElement.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            if (type === 'country') activeCountryFilter = value;
            if (type === 'transit') activeTransitFilter = value;

            renderDestinations();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderDestinations(); 
        });

        function openSheet(cityName) {
            const dest = destinations.find(d => d.city === cityName);
            const mediaBox = document.getElementById('media-content');
            const itineraryContainer = document.getElementById('itinerary-container');
            
            document.getElementById('sheet-title').innerText = dest.city;
            document.getElementById('sheet-desc').innerText = dest.desc || '';
            mediaBox.innerHTML = `<div class="media-container"><img src="${dest.bg}"></div>`;
            
            itineraryContainer.innerHTML = ''; 
            const fragment = document.createDocumentFragment();

            dest.itinerary.forEach((step, index) => {
                const stepElement = document.createElement('div');
                stepElement.className = 'itinerary-step';
                stepElement.style.animationDelay = `${Math.min((index + 1) * 0.04, 0.4)}s`;
                
                stepElement.innerHTML = `
                    <div class="step-icon ${step.active ? 'active' : ''}">
                        <i data-lucide="${step.icon.toLowerCase()}"></i>
                    </div>
                    <div class="step-details">
                        <span class="step-time">${step.time}</span>
                        <h4>${step.title}</h4>
                        <p>${step.text}</p>
                    </div>
                `;
                fragment.appendChild(stepElement);
            });
            
            itineraryContainer.appendChild(fragment);
            document.getElementById('sheet').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
            lucide.createIcons({ node: itineraryContainer });
        }

        function closeSheet() {
            document.getElementById('sheet').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
