<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TravelQR: Agency Edition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --primary: #f59e0b; 
            --bg: #030712;
            --text-main: #f9fafb;
            --text-muted: #a1a1aa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top right, #111827, #030712);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; height: 100vh;
        }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 40px 20px 20px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(3,7,18,0.8), transparent);
        }

        .dynamic-title {
            font-size: 14px; font-weight: 600; letter-spacing: 2px;
            color: var(--primary); text-transform: uppercase;
        }

        .swiper { width: 100%; height: 100vh; padding-top: 80px; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; width: 320px; }

        .card {
            width: 100%; height: 500px;
            background-size: cover; background-position: center;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 30px; box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden;
        }

        .card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 70%);
            z-index: 1;
        }

        .card-content { position: relative; z-index: 2; }
        .card h2 { font-size: 28px; margin: 0; font-weight: 800; line-height: 1.2; }
        .card p { color: #e5e7eb; margin: 10px 0 20px; font-size: 14px; }

        .btn-view {
            background: var(--primary); color: black; border: none;
            padding: 15px; border-radius: 15px; font-weight: 700;
            cursor: pointer; width: 100%;
        }

        #sheet {
            position: fixed; bottom: -100%; left: 0;
            width: 100%; height: 85%;
            background: #ffffff; color: #111827;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            z-index: 100; padding: 30px 20px; box-sizing: border-box;
            transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        #sheet.open { bottom: 0; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            z-index: 90; backdrop-filter: blur(8px);
        }

        .media-container {
            width: 100%; border-radius: 20px; overflow: hidden;
            margin-bottom: 20px; background: #eee;
        }

        img { width: 100%; display: block; border-radius: 20px; }

        .agency-itinerary {
            position: relative; padding-left: 20px; margin: 30px 0;
        }

        .agency-itinerary::before {
            content: ''; position: absolute; left: 34px; top: 0; bottom: 0;
            width: 2px; background: #f3f4f6; z-index: 0;
        }

        .itinerary-step {
            display: flex; gap: 20px; margin-bottom: 25px;
            position: relative; z-index: 1; opacity: 0;
        }

        #sheet.open .itinerary-step {
            animation: fadeInUp 0.5s ease forwards;
        }

        .step-icon {
            width: 32px; height: 32px; background: white;
            border: 2px solid #e5e7eb; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; flex-shrink: 0;
        }

        .step-icon.active {
            border-color: var(--primary); color: var(--primary);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
            animation: pulseIcon 2s infinite;
        }

        .step-details h4 { margin: 0; font-size: 16px; font-weight: 700; }
        .step-details p { margin: 4px 0 0; font-size: 13px; color: #64748b; }
        .step-time { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <span class="dynamic-title">Аялал</span>
        <h1 style="margin: 5px 0; font-weight: 800;">Аялалын Чиглэл</h1>
    </header>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="swiper-wrapper"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeSheet()"></div>
    
    <div id="sheet">
        <div style="width: 45px; height: 5px; background: #e5e7eb; border-radius: 10px; margin: -15px auto 25px;"></div>
        
        <div id="media-content"></div>

        <h2 id="sheet-title" style="font-size: 28px; margin: 0; font-weight: 800;">Хот</h2>
        <p id="sheet-desc" style="color: #6b7280; margin: 5px 0 20px;">Тайлбар</p>
        
        <!-- This container is now dynamic -->
        <div class="agency-itinerary" id="itinerary-container"></div>

        <button onclick="closeSheet()" style="width: 100%; padding: 18px; border-radius: 15px; border: none; background: #000; color: white; font-weight: 700; font-size: 16px;">Буцах</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide@0.372.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const destinations = [
            { 
                city: "Улаанбаатар-Замын-Үүд", 
                desc: "Малчдад зориулсан аялал", 
                bg: "UB_downtown.jpg",
                itinerary: [
                    { icon: "train-front", time: "15:30", title: "УБ-Хотын төмөр зам", text: "Хүрэлцэн ирэх, Зураг даруулах", active:true },
                    { icon: "train-track", time: "16:40", title: "УБ-Хотын төмөр зам", text: "Богоон хөдлөх", active:true },
                    { icon: "bed", time: "Шөнө", title: "Ая тухтай аялал", text: "2-р зэрэглэлийн унтлагын вагоноор тухтай зорчино.", active: true },
                    { icon: "pin", time: "Өдөр 2", title: "БНХАУ-ын Өвөрмонгол", text: "Туршлага солилцох", active: true },
                    { icon: "hotel", time: "Өдөр 2", title: "БНХАУ-ын Өвөрмонгол", text: "Han Ting сүлжээ буудал, өглөөний цай оройн хоол орсон", active: true },
                    { icon: "Hospital", time: "Өдөр 3", title: "Шилийн гол аймгийн Олон Улсын Монгол Эмнэлэг", text: "Энэхүү эмнэлэг дээрээ манай аялагчид шинжилгээндээ хамрагдах юм. Мөн дараагаар нь Шилийн гол аймгийн төвийн цагаан идээний үйлдвэртэй танилцан, худалдан авалт хийх бүрэн боломжтой. Үдээс хойш нь шинжилгээний хариугаа аван эмчээсээ зөвлөгөө үйлчилгээгээ авна.", active:true },
                    { icon: "hotel", time: "Өдөр 4", title: "Шилийн гол аймаг", text: "Чөлөөт өдөр, Буудлаасаа ойрхон зайд орших Тахилгат- Эрдэнэ овоо Бээсийн сүм, зах, дэлгүүрээр шофинг хийнэ. 13:00 цагт өрөөгөө хүлээлгэн өгөөд Эрээн хотын зүг буцна.", active:true },
                    { icon: "pin", time: "Өдөр 5", title: "Эрээн хот-Замын-Үүд", text: "14:00 цагаас хөтөчийн заасан газарт цуглан Хятад улсын хил болон Монгол улсын хилээр гаран 18:00 цагт Замын үүд – Улаанбаатар чиглэлийн галт тэргээр хөдөлж (2-р зэрэглэл буюу “унтлагын вагон” – зорчигчийн нээлттэй таславчуудтай цагаан хэрэглэл, зөөлөн эдлэлтэй) аялна.", active:true },
                    { icon: "train-track", time: "18:00", title: "УБ-Хотын чиглэлийн галт", text: "Богоон хөдлөх", active:true },
                    { icon: "train-front", time: "Өдөр 6", title: "Улаанбаатар", text: "Өглөөний 09:20 цагт Улаанбаатар төмөр замын буудалд ирсэнээр дурсамж дүүрэн, үр бүтээлтэй аялал өндөрлөнө.", active: true }
                ]
            },
            { 
                city: "Бээжин", 
                desc: "Юниверсал парк ба Дэлхийн парк", 
                bg: "https://images.unsplash.com/photo-1508804185872-d7badad00f7d?auto=format&fit=crop&w=800",
                itinerary: [
                    { icon: "bus", time: "Phase 1", title: "Тээвэр", text: "Автобусаар парк руу явна" },
                    { icon: "camera", time: "Phase 2", title: "Зураг авалт", text: "Юниверсал парк дээрх чөлөөт цаг", active: true },
                    { icon: "utensils", time: "Phase 3", title: "Оройн хоол", text: "Бээжин нугас зооглох" }
                ]
            },
            { 
                city: "Дубай", 
                desc: "Арабын нэгдсэн Эмират улс", 
                bg: "https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=800",
                itinerary: [
                    { icon: "sun", time: "Day 1", title: "Сафари аялал", text: "Элсэн цөлөөр жипээр аялах", active: true },
                    { icon: "building-2", time: "Day 2", title: "Бурж Халифа", text: "Дэлхийн хамгийн өндөр цамхаг" }
                ]
            }
            // Repeat this pattern for all other locations...
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const wrapper = document.getElementById('swiper-wrapper');
            destinations.forEach(dest => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.innerHTML = `
                    <div class="card" style="background-image: url('${dest.bg}')">
                        <div class="card-content">
                            <h2>${dest.city}</h2>
                            <p>${dest.desc}</p>
                            <button class="btn-view" onclick="openSheet('${dest.city}')">Маршрут харах</button>
                        </div>
                    </div>
                `;
                wrapper.appendChild(slide);
            });

            new Swiper(".mySwiper", {
                effect: "coverflow",
                centeredSlides: true,
                slidesPerView: "auto",
                coverflowEffect: { rotate: 5, stretch: 0, depth: 100, modifier: 2, slideShadows: false },
            });
            lucide.createIcons();
        });

        function openSheet(cityName) {
            const dest = destinations.find(d => d.city === cityName);
            const mediaBox = document.getElementById('media-content');
            const itineraryContainer = document.getElementById('itinerary-container');
            
            document.getElementById('sheet-title').innerText = dest.city;
            document.getElementById('sheet-desc').innerText = dest.desc;
            mediaBox.innerHTML = `<div class="media-container"><img src="${dest.bg}"></div>`;
            
            // Build the dynamic itinerary
            itineraryContainer.innerHTML = ''; // Clear old steps
            dest.itinerary.forEach((step, index) => {
                const stepElement = document.createElement('div');
                stepElement.className = 'itinerary-step';
                stepElement.style.animationDelay = `${(index + 1) * 0.15}s`;
                
                stepElement.innerHTML = `
                    <div class="step-icon ${step.active ? 'active' : ''}">
                        <i data-lucide="${step.icon}"></i>
                    </div>
                    <div class="step-details">
                        <span class="step-time">${step.time}</span>
                        <h4>${step.title}</h4>
                        <p>${step.text}</p>
                    </div>
                `;
                itineraryContainer.appendChild(stepElement);
            });

            document.getElementById('sheet').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
            lucide.createIcons();
        }

        function closeSheet() {
            document.getElementById('sheet').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
